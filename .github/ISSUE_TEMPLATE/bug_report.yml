name: "Bug 报告"
description: "反馈可复现的问题，帮助快速定位与修复"
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈。请尽量完整填写信息，便于我们快速复现与修复。
  - type: input
    id: env
    attributes:
      label: 运行环境
      description: "例如：Windows 11 / Python 3.14 / EXE 版本号"
      placeholder: "Windows 11 23H2, Python 3.14, v1.0.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: "请按顺序描述操作步骤"
      placeholder: |
        1. 打开程序
        2. 点击“智能选择”
        3. 选择某个 m3u8 文件
        4. 点击开始转换后报错
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: "应成功生成 mp4 文件"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: "出现报错弹窗，或输出文件损坏"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志或截图
      description: "请粘贴完整报错堆栈，或附上截图"
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已在最新版本复现该问题
          required: true
        - label: 我已搜索过现有 Issues，确认不是重复问题
          required: true

